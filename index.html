<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SahrawyCrypto Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; color: #94a3b8; padding: 12px; border-bottom: 2px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        .up { color: #10b981; font-weight: bold; }
        .down { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-bold text-blue-400">SahrawyCrypto <span class="text-white text-sm">PRO</span></h1>
            <span class="text-green-400 text-xs bg-green-400/10 px-2 py-1 rounded">السوق مباشر الآن</span>
        </header>

        <div class="card">
            <h2 class="mb-4 text-blue-300"><i class="fas fa-chart-line ml-2"></i> أسعار العملات اللحظية</h2>
            <table>
                <thead>
                    <tr>
                        <th>العملة</th>
                        <th>السعر (USD)</th>
                        <th>تغير 24س</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Bitcoin</td>
                        <td id="btc-price" class="font-mono">جاري التحميل...</td>
                        <td id="btc-change">--%</td>
                    </tr>
                    <tr>
                        <td>Ethereum</td>
                        <td id="eth-price" class="font-mono">جاري التحميل...</td>
                        <td id="eth-change">--%</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer class="text-center text-gray-500 text-xs mt-10">
            &copy; 2026 SahrawyCrypto - تم التحديث بنجاح
        </footer>
    </div>

    <script>
        async function loadPrices() {
            try {
                const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
                const d = await r.json();
                
                // تحديث الجدول
                document.getElementById('btc-price').innerText = '$' + d.bitcoin.usd.toLocaleString();
                document.getElementById('btc-change').innerText = d.bitcoin.usd_24h_change.toFixed(2) + '%';
                document.getElementById('btc-change').className = d.bitcoin.usd_24h_change >= 0 ? 'up' : 'down';

                document.getElementById('eth-price').innerText = '$' + d.ethereum.usd.toLocaleString();
                document.getElementById('eth-change').innerText = d.ethereum.usd_24h_change.toFixed(2) + '%';
                document.getElementById('eth-change').className = d.ethereum.usd_24h_change >= 0 ? 'up' : 'down';
            } catch(e) { console.error("Error"); }
        }
        loadPrices();
        setInterval(loadPrices, 30000);
    </script>
</body>
</html>
