
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SahrawyCrypto Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0b0f1a; color: white; }
        .crypto-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.05); }
        .price-up { color: #10b981; }
        .price-down { color: #ef4444; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-500">SahrawyCrypto <span class="text-white text-xs">LIVE</span></h1>
                <p class="text-gray-400 text-sm">تحديث حي لأسعار السوق</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="crypto-container">
            <div class="crypto-card p-6 rounded-2xl shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <i class="fab fa-bitcoin text-4xl text-orange-500"></i>
                    <span id="btc-change" class="font-bold">--%</span>
                </div>
                <h3 class="text-gray-400">Bitcoin (بيتكوين)</h3>
                <div id="btc-price" class="text-3xl font-bold mt-2 font-mono text-white">جاري التحميل...</div>
            </div>

            <div class="crypto-card p-6 rounded-2xl shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <i class="fab fa-ethereum text-4xl text-blue-400"></i>
                    <span id="eth-change" class="font-bold">--%</span>
                </div>
                <h3 class="text-gray-400">Ethereum (إيثيريوم)</h3>
                <div id="eth-price" class="text-3xl font-bold mt-2 font-mono text-white">جاري التحميل...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                
                document.getElementById('btc-price').innerText = '$' + data.bitcoin.usd.toLocaleString();
                document.getElementById('btc-change').innerText = data.bitcoin.usd_24h_change.toFixed(2) + '%';
                document.getElementById('btc-change').className = data.bitcoin.usd_24h_change >= 0 ? 'price-up' : 'price-down';

                document.getElementById('eth-price').innerText = '$' + data.ethereum.usd.toLocaleString();
                document.getElementById('eth-change').innerText = data.ethereum.usd_24h_change.toFixed(2) + '%';
                document.getElementById('eth-change').className = data.ethereum.usd_24h_change >= 0 ? 'price-up' : 'price-down';
            } catch (e) { console.log("Error"); }
        }
        fetchPrices();
        setInterval(fetchPrices, 30000); // تحديث كل 30 ثانية
    </script>
</body>
</html>
